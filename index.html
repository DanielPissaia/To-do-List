<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Boa do dia</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="container">
        <selection id="loginSection">
            <h2>Entrar na Agenda TI</h2>

            <label for="loginEmail">E-mail</label>
            <input type="email" id="loginEmail" placeholder="Digite seu e-mail">

            <label for="loginPassword">Senha</label>
            <input type="password" id="loginPassword" placeholder="Digite sua senha">

            <button id="loginButton">Entrar</button>
            <p id="loginMessage"></p>

            </selection>

            <section id="appSection" hidden>

        <p id="currentDate"></p>

        <h1>Boa do dia</h1>

        <div class="date-selector">
            <label for="taskDate">
                Selecione a data:
            </label>

            <input
                type="date"
                id="taskDate"
            >
        </div>

        <div class="task-form">
            <input
                type="text"
                id="taskInput"
                placeholder="Digite a boa de hoje"
            >

            <button id="addTaskButton">
                Adicionar
            </button>

            <button id="clearTasksButton">
                Limpar
            </button>
        </div>

        <ul id="taskList"></ul>
        <section id="appSection" hidden>
        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script> 
    <script src="script.js"></script>
</body>

</html>
