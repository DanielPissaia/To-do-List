<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Organizadora TI</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="container">

        <!-- Área de login -->
        <section id="loginSection">
            <h2>Entrar na Organizadora TI</h2>

            <label for="loginEmail">
                E-mail
            </label>

            <input
                type="email"
                id="loginEmail"
                placeholder="Digite seu e-mail"
                autocomplete="email"
            >

            <label for="loginPassword">
                Senha
            </label>

            <input
                type="password"
                id="loginPassword"
                placeholder="Digite sua senha"
                autocomplete="current-password"
            >

            <button
                id="loginButton"
                type="button"
            >
                Entrar
            </button>

            <p id="loginMessage"></p>
        </section>

        <!-- Área principal -->
        <section id="appSection" hidden>

            <header class="app-header">
                <div class="app-title">
                    <span class="app-icon">
                        ✓
                    </span>

                    <div>
                        <h1>Organizadora TI</h1>

                        <p>
                            Organize as tarefas e suas prioridades
                        </p>
                    </div>
                </div>

                <button
                    id="logoutButton"
                    type="button"
                    class="logout-button"
                >
                    Sair
                </button>
            </header>

            <!-- Criar uma nova tarefa -->
            <div class="task-creator">
                <input
                    type="text"
                    id="taskInput"
                    placeholder="Digite uma nova tarefa"
                    autocomplete="off"
                >

                <select id="taskCategory">
                    <option value="important">
                        Mais importante
                    </option>

                    <option
                        value="required"
                        selected
                    >
                        Precisa ser feito
                    </option>

                    <option value="whenever">
                        Fazer quando tiver tempo
                    </option>
                </select>

                <button
                    id="addTaskButton"
                    type="button"
                >
                    Adicionar tarefa
                </button>
            </div>

            <!-- Quadro de prioridades -->
            <div class="priority-board">

                <!-- Mais importante -->
                <section
                    class="priority-column important-column"
                    data-category="important"
                >
                    <header class="column-header">
                        <div>
                            <h2>
                                🚩 Mais importante
                            </h2>

                            <p>
                                Tarefas urgentes ou de impacto imediato
                            </p>
                        </div>

                        <span
                            id="importantCount"
                            class="task-count"
                        >
                            0
                        </span>
                    </header>

                    <div
                        id="importantList"
                        class="task-drop-zone"
                        data-category="important"
                    ></div>
                </section>

                <!-- Precisa ser feito -->
                <section
                    class="priority-column required-column"
                    data-category="required"
                >
                    <header class="column-header">
                        <div>
                            <h2>
                                📋 Precisa ser feito
                            </h2>

                            <p>
                                Tarefas necessárias, mas não urgentes
                            </p>
                        </div>

                        <span
                            id="requiredCount"
                            class="task-count"
                        >
                            0
                        </span>
                    </header>

                    <div
                        id="requiredList"
                        class="task-drop-zone"
                        data-category="required"
                    ></div>
                </section>

                <!-- Fazer quando tiver tempo -->
                <section
                    class="priority-column whenever-column"
                    data-category="whenever"
                >
                    <header class="column-header">
                        <div>
                            <h2>
                                ◷ Fazer quando tiver tempo
                            </h2>

                            <p>
                                Melhorias e atividades sem urgência
                            </p>
                        </div>

                        <span
                            id="wheneverCount"
                            class="task-count"
                        >
                            0
                        </span>
                    </header>

                    <div
                        id="wheneverList"
                        class="task-drop-zone"
                        data-category="whenever"
                    ></div>
                </section>

            </div>
        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>

</html>
